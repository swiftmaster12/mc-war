name: CivboundWar
version: '${project.version}'
main: com.civbound.war.CivboundWar
api-version: "1.21"
author: Civbound
description: Civbound War v2 - best-of-3 siege-point war over admin-defined capture points, hooked into Lands.
depend: [Lands]
softdepend: [PaperFlashback, ProtocolLib, Nexo]
commands:
  war:
    description: Manage Civbound wars (create/start/stop/status/map/preview/cap/ally/staging/vassal).
    usage: |
      /war create <name> <attackerLand> <defenderLand> - create a named war (register allies/staging first)
      /war start <name> | <attackerLand> <defenderLand> - start a war / next battle
      /war stop <name|land> - force-end a battle/campaign
      /war status [name|land] - show series score, siege points, time, caps
      /war map [name|land] - text grid of the defender's chunks
      /war preview <name|land> - toggle beacon previews at a war's caps
      /war cap add|remove|list <land> [tier|id] - manage capture points
      /war ally add|remove|list <attacker|defender> [allyLand] - manage allies
      /war staging set <name|attacker defender> <stagingLand> - link a staging base & auto-trust eligible attackers
      /war staging clear <attacker> - unlink staging base & untrust
      /war vassal set|clear|list [vassalLand] [overlordLand] - manage vassal tax
      /war reload - reload config.yml
    aliases: [war]
permissions:
  civboundwar.admin:
    description: Manage wars, caps, allies, vassals.
    default: op
  civboundwar.status:
    description: View war status and map.
    default: true
